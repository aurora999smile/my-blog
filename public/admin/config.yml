backend:
  name: github
  repo: aurora999smile/my-blog
  branch: main
  base_url: https://decap-oauth.netlify.app
  auth_type: implicit

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "文章"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "标题"
        name: "title"
        widget: "string"
        pattern: ['.{1,80}', "标题不能超过80个字符"]
      
      - label: "描述"
        name: "description"
        widget: "text"
        pattern: ['.{1,200}', "描述不能超过200个字符"]
      
      - label: "发布日期"
        name: "pubDate"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      
      - label: "更新日期"
        name: "updatedDate"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false
      
      - label: "封面图片"
        name: "cover"
        widget: "image"
        required: false
        media_library:
          config:
            max_file_size: 5120000
      
      - label: "标签"
        name: "tags"
        widget: "list"
        allow_add: true
        required: false
      
      - label: "分类"
        name: "categories"
        widget: "list"
        allow_add: true
        required: false
      
      - label: "是否显示目录"
        name: "toc"
        widget: "boolean"
        default: true
        required: false
      
      - label: "是否启用评论"
        name: "comment"
        widget: "boolean"
        default: true
        required: false
      
      - label: "内容"
        name: "body"
        widget: "markdown"
